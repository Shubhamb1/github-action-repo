# This is workflow name
name: Hello Workflow

# runs on an automatic trigger, whenever change is pushed to branch (deployment)
on:
  push:
    branches: [main]

# These are jobs inside the workflow
jobs:

  # This is name of Job 1
  greet:
    # This is runner, Each job runs on a runner
    runs-on: ubuntu-latest
    steps:
      - name: say hello to user
        run: echo "Hello World"

      - name: say hello to username
        run: echo "Hello $USER"

  # This is name of Job 2
  show-version:
    runs-on: ubuntu-latest
    steps:
      - name: show what is the version of python, docker, etc.
        run: docker --version && python --version
